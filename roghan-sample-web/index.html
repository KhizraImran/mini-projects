<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Roghan Restaurant — Premium halal dining in Farwaniya, Kuwait. Authentic Middle Eastern & South Asian cuisine with luxury hospitality.">
  <meta name="keywords" content="Roghan Restaurant, Farwaniya, Kuwait, halal restaurant, mixed grill, biryani, machboos, fine dining">
  <meta property="og:title" content="Roghan Restaurant — Premium Dining in Farwaniya, Kuwait">
  <meta property="og:description" content="Authentic Middle Eastern & South Asian cuisine crafted with premium halal ingredients.">
  <meta property="og:type" content="website">
  <title>Roghan Restaurant | مطعم روغان — Farwaniya, Kuwait</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- GSAP CDN (loaded in head for animation priority) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>

  <!-- ══════════════════════════════════════════
       PAGE LOADER
  ══════════════════════════════════════════ -->
  <div id="page-loader" role="status" aria-label="Loading Roghan Restaurant">
    <div class="loader-brand">Roghan</div>
    <div class="loader-bar"></div>
    <div class="loader-tagline">Premium Restaurant · Kuwait</div>
  </div>

  <!-- ══════════════════════════════════════════
       FLOATING NAVIGATION
  ══════════════════════════════════════════ -->
  <header id="navbar" role="banner" aria-label="Site Navigation"></header>

  <!-- ══════════════════════════════════════════
       FULLSCREEN MOBILE MENU
  ══════════════════════════════════════════ -->
  <div id="mobile-menu" role="dialog" aria-modal="true" aria-label="Mobile Navigation"></div>

  <!-- ══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════ -->
  <main id="main-content">

    <!-- HERO -->
    <section id="hero" aria-label="Hero Section"></section>

    <!-- ABOUT -->
    <section id="about" class="section" aria-label="About Roghan Restaurant"></section>

    <!-- MENU -->
    <section id="menu" class="section" aria-label="Roghan Menu"></section>

    <!-- WHY CHOOSE US -->
    <section id="why" class="section" aria-label="Why Choose Roghan"></section>

    <!-- GALLERY -->
    <section id="gallery" class="section" aria-label="Restaurant Gallery"></section>

    <!-- TESTIMONIALS -->
    <section id="testimonials" class="section" aria-label="Guest Reviews"></section>

    <!-- RESERVATION CTA -->
    <section id="reservation" aria-label="Reserve a Table"></section>

    <!-- MAP -->
    <section id="map-section" aria-label="Restaurant Location"></section>

    <!-- CONTACT -->
    <section id="contact" aria-label="Contact Roghan Restaurant"></section>

  </main>

  <!-- ══════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════ -->
  <footer id="footer" role="contentinfo"></footer>

  <!-- ══════════════════════════════════════════
       SCROLL TO TOP BUTTON
  ══════════════════════════════════════════ -->
  <button id="scroll-top" aria-label="Scroll to top" title="Back to top">↑</button>

  <!-- Main Script -->
  <script src="script.js"></script>

</body>
</html>
